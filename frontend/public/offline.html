<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <title>Offline — AI Job Finder Israel</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        font-family: Inter, 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 45%, #f1f5f9 100%);
        color: #0f172a;
      }
      .card {
        max-width: 24rem;
        width: 100%;
        text-align: center;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 1.25rem;
        padding: 2rem 1.5rem;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      }
      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.75rem;
        font-weight: 700;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.9375rem;
        line-height: 1.55;
        color: #64748b;
        margin-bottom: 1.25rem;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-size: 0.9375rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        cursor: pointer;
      }
      button:active {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">AI</div>
      <h1>You're offline</h1>
      <p>
        AI Job Finder Israel needs an internet connection for job matching and uploads.
        Cached pages may still be available.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
    <script>
      // Escape hatch: if a prod service worker traps localhost, self-heal and reload.
      (function () {
        var host = location.hostname;
        if (host !== 'localhost' && host !== '127.0.0.1') return;
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (!regs.length) return;
          return Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
            if ('caches' in window) {
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              });
            }
          }).then(function () { location.reload(); });
        });
      })();
    </script>
  </body>
</html>
